<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <!-- Pencil sketch filter for hand-drawn feel -->
    <filter id="sketch" x="-2%" y="-2%" width="104%" height="104%">
      <feTurbulence type="turbulence" baseFrequency="0.03" numOctaves="4" result="turb"/>
      <feDisplacementMap in="SourceGraphic" in2="turb" scale="1.5" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="pencil-texture">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" result="noise"/>
      <feComposite in="SourceGraphic" in2="noise" operator="in"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="500" fill="#f8f6f0"/>

  <!-- Notebook body - slightly rotated for artistic feel -->
  <g transform="translate(200,250) rotate(-3) translate(-200,-250)" filter="url(#sketch)">

    <!-- Notebook cover shadow -->
    <rect x="68" y="52" width="270" height="370" rx="4" fill="#c8c0b0" opacity="0.4"/>

    <!-- Notebook back cover -->
    <rect x="62" y="45" width="270" height="370" rx="3" fill="#8b7355" stroke="#6b5535" stroke-width="1.5"/>

    <!-- Notebook front page (cream/white) -->
    <rect x="55" y="40" width="270" height="370" rx="3" fill="#faf8f2" stroke="#9b8b6b" stroke-width="1.8"/>

    <!-- Spiral binding holes -->
    <g fill="#6b5535" stroke="#5a4525" stroke-width="0.8">
      <circle cx="55" cy="75" r="5"/>
      <circle cx="55" cy="115" r="5"/>
      <circle cx="55" cy="155" r="5"/>
      <circle cx="55" cy="195" r="5"/>
      <circle cx="55" cy="235" r="5"/>
      <circle cx="55" cy="275" r="5"/>
      <circle cx="55" cy="315" r="5"/>
      <circle cx="55" cy="355" r="5"/>
    </g>

    <!-- Spiral wire -->
    <g fill="none" stroke="#888" stroke-width="1.8" stroke-linecap="round">
      <path d="M55,70 C40,70 40,80 55,80"/>
      <path d="M55,110 C40,110 40,120 55,120"/>
      <path d="M55,150 C40,150 40,160 55,160"/>
      <path d="M55,190 C40,190 40,200 55,200"/>
      <path d="M55,230 C40,230 40,240 55,240"/>
      <path d="M55,270 C40,270 40,280 55,280"/>
      <path d="M55,310 C40,310 40,320 55,320"/>
      <path d="M55,350 C40,350 40,360 55,360"/>
    </g>

    <!-- Red margin line -->
    <line x1="95" y1="42" x2="95" y2="408" stroke="#d4736a" stroke-width="1" opacity="0.5"/>

    <!-- Faint ruled lines -->
    <g stroke="#c8d0d8" stroke-width="0.4" opacity="0.6">
      <line x1="70" y1="90" x2="315" y2="90"/>
      <line x1="70" y1="120" x2="315" y2="120"/>
      <line x1="70" y1="150" x2="315" y2="150"/>
      <line x1="70" y1="180" x2="315" y2="180"/>
      <line x1="70" y1="210" x2="315" y2="210"/>
      <line x1="70" y1="240" x2="315" y2="240"/>
      <line x1="70" y1="270" x2="315" y2="270"/>
      <line x1="70" y1="300" x2="315" y2="300"/>
      <line x1="70" y1="330" x2="315" y2="330"/>
      <line x1="70" y1="360" x2="315" y2="360"/>
    </g>

    <!-- Title text - hand-drawn style -->
    <text x="110" y="72" font-family="Georgia, serif" font-size="25" fill="#3a3225" font-weight="bold" opacity="0.85">DIL</text>
    <text x="110" y="88" font-family="Georgia, serif" font-size="14" fill="#3a3225" font-style="italic" opacity="0.85">Distributed Intent Ledger</text>

    <!-- Checkbox lines - sketchy hand-drawn feel -->
    <g stroke="#4a4035" stroke-width="1.2" fill="none" stroke-linecap="round" stroke-linejoin="round">

      <!-- Line 1 - checked -->
      <rect x="105" y="97" width="12" height="12" rx="1.5"/>
      <path d="M107,103 L110,107 L115,99" stroke-width="1.8"/>
      <line x1="125" y1="106" x2="280" y2="105" opacity="0.6"/>

      <!-- Line 2 - checked -->
      <rect x="105" y="127" width="12" height="12" rx="1.5"/>
      <path d="M107,133 L110,137 L115,129" stroke-width="1.8"/>
      <line x1="125" y1="136" x2="260" y2="135" opacity="0.6"/>

      <!-- Line 3 - unchecked, being drawn -->
      <rect x="105" y="157" width="12" height="12" rx="1.5"/>
      <line x1="125" y1="166" x2="290" y2="165" opacity="0.6"/>

      <!-- Line 4 - checked -->
      <rect x="105" y="187" width="12" height="12" rx="1.5"/>
      <path d="M107,193 L110,197 L115,189" stroke-width="1.8"/>
      <line x1="125" y1="196" x2="245" y2="195" opacity="0.6"/>

      <!-- Line 5 - unchecked -->
      <rect x="105" y="217" width="12" height="12" rx="1.5"/>
      <line x1="125" y1="226" x2="270" y2="225" opacity="0.6"/>

      <!-- Line 6 - checked -->
      <rect x="105" y="247" width="12" height="12" rx="1.5"/>
      <path d="M107,253 L110,257 L115,249" stroke-width="1.8"/>
      <line x1="125" y1="256" x2="300" y2="255" opacity="0.6"/>

      <!-- Line 7 - unchecked, partially written -->
      <rect x="105" y="277" width="12" height="12" rx="1.5"/>
      <line x1="125" y1="286" x2="210" y2="285" opacity="0.6"/>

      <!-- Line 8 - faint/future -->
      <rect x="105" y="307" width="12" height="12" rx="1.5" opacity="0.3"/>
      <line x1="125" y1="316" x2="240" y2="315" opacity="0.25"/>

      <!-- Line 9 - very faint -->
      <rect x="105" y="337" width="12" height="12" rx="1.5" opacity="0.15"/>
      <line x1="125" y1="346" x2="200" y2="345" opacity="0.12"/>
    </g>
  </g>

  <!-- Pencil - laying across the page at an angle -->
  <g transform="translate(204,128) rotate(119)">
    <!-- Pencil body -->
    <rect x="0" y="-5" width="120" height="10" rx="1" fill="#f0c040" stroke="#d4a020" stroke-width="0.8"/>

    <!-- Pencil facets (hexagonal illusion) -->
    <rect x="0" y="-5" width="120" height="3.3" rx="1" fill="#f5d060" opacity="0.6"/>
    <rect x="0" y="1.7" width="120" height="3.3" rx="1" fill="#d4a020" opacity="0.3"/>

    <!-- Metal ferrule -->
    <rect x="-18" y="-6" width="20" height="12" rx="1" fill="#b8b0a0" stroke="#908878" stroke-width="0.8"/>
    <line x1="-15" y1="-6" x2="-15" y2="6" stroke="#908878" stroke-width="0.5"/>
    <line x1="-10" y1="-6" x2="-10" y2="6" stroke="#908878" stroke-width="0.5"/>
    <line x1="-5" y1="-6" x2="-5" y2="6" stroke="#908878" stroke-width="0.5"/>

    <!-- Eraser -->
    <rect x="-28" y="-5.5" width="12" height="11" rx="2" fill="#e08080" stroke="#c06060" stroke-width="0.6"/>

    <!-- Pencil tip (wood + graphite) -->
    <polygon points="120,-5 120,5 140,0" fill="#d4a848" stroke="#b08828" stroke-width="0.5"/>
    <polygon points="134,-2 134,2 142,0" fill="#4a4a4a"/>

    <!-- Graphite point -->
    <circle cx="142" cy="0" r="0.8" fill="#2a2a2a"/>
  </g>

  <!-- Small graphite marks near pencil tip suggesting active drawing -->
  <g fill="#4a4035" opacity="0.3">
    <circle cx="114" cy="308" r="0.6"/>
    <circle cx="112" cy="310" r="0.4"/>
    <circle cx="116" cy="306" r="0.5"/>
  </g>
</svg>
